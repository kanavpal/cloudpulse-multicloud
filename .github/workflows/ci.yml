name: ✅ CloudStay CI — PR Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  # ── Frontend: Lint & Build ─────────────────────────────────────────────────
  lint-and-test:
    name: 🧪 Frontend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Check build succeeds
        run: npm run build
        env:
          CI: false

  # ── Backend: Django Tests ─────────────────────────────────────────────────
  test-backend:
    name: 🐍 Backend — Django Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cloudstay_test
          POSTGRES_USER: cloudstay_user
          POSTGRES_PASSWORD: cloudstay_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: core.settings
      CLOUD_NAME: CI-TEST
      DB_NAME: cloudstay_test
      DB_USER: cloudstay_user
      DB_PASSWORD: cloudstay_pass
      DB_HOST: localhost
      DB_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run Django tests
        run: python manage.py test --verbosity=2
