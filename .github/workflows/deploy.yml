name: 🚀 CloudPulse CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:      # allow manual trigger from GitHub UI

env:
  BACKEND_PATH: /home/ubuntu/backend   # Django backend lives here on both servers
  DOCKER_CONTAINER_AWS: sweet_newton   # AWS Docker container name
  DOCKER_CONTAINER_ORACLE: naughty_goodall  # Oracle Docker container name

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1 — Test & Build React frontend
  # ─────────────────────────────────────────────────────────
  test-and-build:
    name: 🧪 Test & Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build production bundle
        run: npm run build
        env:
          CI: false          # prevents treating warnings as errors

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: frontend/build/
          retention-days: 3

  # ─────────────────────────────────────────────────────────
  # JOB 2 — Deploy backend to AWS EC2
  # ─────────────────────────────────────────────────────────
  deploy-backend-aws:
    name: 🟠 Deploy Backend → AWS EC2
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - name: SSH deploy to AWS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "── Restarting AWS Docker container ──"
            sudo docker restart ${{ env.DOCKER_CONTAINER_AWS }}
            sleep 3
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health/)
            echo "Health check status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ AWS backend is UP and healthy"
            else
              echo "❌ AWS backend health check failed (HTTP $STATUS)"
              exit 1
            fi

  # ─────────────────────────────────────────────────────────
  # JOB 3 — Deploy backend to Oracle Cloud
  # ─────────────────────────────────────────────────────────
  deploy-backend-oracle:
    name: 🔴 Deploy Backend → Oracle Cloud
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - name: SSH deploy to Oracle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "── Restarting Oracle Docker container ──"
            sudo docker restart ${{ env.DOCKER_CONTAINER_ORACLE }}
            sleep 3
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health/)
            echo "Health check status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Oracle backend is UP and healthy"
            else
              echo "❌ Oracle backend health check failed (HTTP $STATUS)"
              exit 1
            fi

  # ─────────────────────────────────────────────────────────
  # JOB 4 — Discord notification (N)
  # ─────────────────────────────────────────────────────────
  notify-discord:
    name: 🔔 Notify Discord
    runs-on: ubuntu-latest
    needs: [deploy-backend-aws, deploy-backend-oracle]
    if: always()   # run even if deploy jobs fail

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          AWS_RESULT: ${{ needs.deploy-backend-aws.result }}
          ORACLE_RESULT: ${{ needs.deploy-backend-oracle.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "⚠️  DISCORD_WEBHOOK_URL secret not set — skipping notification"
            exit 0
          fi

          if [ "$AWS_RESULT" = "success" ] && [ "$ORACLE_RESULT" = "success" ]; then
            COLOR=3066993
            TITLE="✅ CloudPulse Deploy Succeeded"
            STATUS_AWS="✅ Success"
            STATUS_ORACLE="✅ Success"
          else
            COLOR=15158332
            TITLE="❌ CloudPulse Deploy Failed"
            STATUS_AWS="${AWS_RESULT^}"
            STATUS_ORACLE="${ORACLE_RESULT^}"
          fi

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"🟠 AWS EC2\", \"value\": \"$STATUS_AWS\", \"inline\": true},
                  {\"name\": \"🔴 Oracle Cloud\", \"value\": \"$STATUS_ORACLE\", \"inline\": true},
                  {\"name\": \"👤 Pushed by\", \"value\": \"$ACTOR\", \"inline\": true},
                  {\"name\": \"📝 Commit\", \"value\": \"$COMMIT_MSG\"}
                ],
                \"url\": \"$RUN_URL\"
              }]
            }"
