name: 🚀 CloudStay CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:      # Allow manual trigger from GitHub Actions UI

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1  —  Test & Build React frontend
  # ───────────────────────────────────────────────────────────────────────────
  test-and-build:
    name: 🧪 Test & Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build production bundle
        run: npm run build
        env:
          CI: false          # prevents treating ESLint warnings as errors

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: frontend/build/
          retention-days: 3

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2  —  Backend unit tests (runs in parallel with frontend build)
  # ───────────────────────────────────────────────────────────────────────────
  test-backend:
    name: 🐍 Backend — Django Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cloudstay_test
          POSTGRES_USER: cloudstay_user
          POSTGRES_PASSWORD: cloudstay_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: core.settings
      CLOUD_NAME: CI-TEST
      DB_NAME: cloudstay_test
      DB_USER: cloudstay_user
      DB_PASSWORD: cloudstay_pass
      DB_HOST: localhost
      DB_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run Django tests
        run: python manage.py test --verbosity=2

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3  —  Deploy backend to AWS EC2
  #           Pulls latest code, rebuilds Docker image, restarts container
  # ───────────────────────────────────────────────────────────────────────────
  deploy-aws:
    name: 🟠 Deploy → AWS EC2
    runs-on: ubuntu-latest
    needs: [test-and-build, test-backend]   # only deploy if both tests pass

    steps:
      - name: SSH deploy to AWS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          command_timeout: "10m"
          script: |
            set -e
            echo "━━━ Pulling latest code ━━━"
            cd /home/ubuntu/repo
            git fetch origin main
            git reset --hard origin/main

            echo "━━━ Rebuilding Docker image ━━━"
            cd /home/ubuntu/repo/backend
            docker build -t multicloud-django . 2>&1 | tail -5

            echo "━━━ Restarting container ━━━"
            docker-compose down
            docker-compose up -d

            echo "━━━ Waiting for health check ━━━"
            sleep 20
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health/)
            echo "Health check status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ AWS backend is UP"
              curl -s http://localhost:8000/whoami/
            else
              echo "❌ AWS backend health check FAILED (HTTP $STATUS)"
              docker logs cloudpulse-api --tail 30
              exit 1
            fi

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4  —  Deploy backend + DB to Oracle Cloud
  #           Pulls latest code, rebuilds image, restarts API + DB containers
  # ───────────────────────────────────────────────────────────────────────────
  deploy-oracle:
    name: 🔴 Deploy → Oracle Cloud
    runs-on: ubuntu-latest
    needs: [test-and-build, test-backend]   # deploy in parallel with AWS

    steps:
      - name: SSH deploy to Oracle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          command_timeout: "10m"
          script: |
            set -e
            echo "━━━ Pulling latest code ━━━"
            cd /home/ubuntu/repo
            git fetch origin main
            git reset --hard origin/main

            echo "━━━ Rebuilding Docker image ━━━"
            cd /home/ubuntu/repo/backend
            docker build -t multicloud-django . 2>&1 | tail -5

            echo "━━━ Restarting containers (DB + API) ━━━"
            docker-compose -f docker-compose.oracle.yml down
            docker-compose -f docker-compose.oracle.yml up -d

            echo "━━━ Waiting for health check ━━━"
            sleep 25
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health/)
            echo "Health check status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Oracle backend is UP"
              curl -s http://localhost:8000/whoami/
            else
              echo "❌ Oracle backend health check FAILED (HTTP $STATUS)"
              docker logs cloudpulse-api --tail 30
              exit 1
            fi

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5  —  Summary notification (runs even on failure)
  # ───────────────────────────────────────────────────────────────────────────
  notify:
    name: 🔔 Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-aws, deploy-oracle]
    if: always()

    steps:
      - name: Print deployment summary
        env:
          AWS_RESULT: ${{ needs.deploy-aws.result }}
          ORACLE_RESULT: ${{ needs.deploy-oracle.result }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  CloudStay Deployment Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Pushed by : $ACTOR"
          echo "  Commit    : $COMMIT_MSG"
          echo "  🟠 AWS    : $AWS_RESULT"
          echo "  🔴 Oracle : $ORACLE_RESULT"
          echo "  🔗 Run    : $RUN_URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          AWS_RESULT: ${{ needs.deploy-aws.result }}
          ORACLE_RESULT: ${{ needs.deploy-oracle.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
        run: |
          # Skip gracefully if webhook not configured
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "⚠️  DISCORD_WEBHOOK_URL not set — skipping Discord notification"
            exit 0
          fi

          if [ "$AWS_RESULT" = "success" ] && [ "$ORACLE_RESULT" = "success" ]; then
            COLOR=3066993
            TITLE="✅ CloudStay Deploy Succeeded"
          else
            COLOR=15158332
            TITLE="❌ CloudStay Deploy Failed"
          fi

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"🟠 AWS EC2\", \"value\": \"$AWS_RESULT\", \"inline\": true},
                  {\"name\": \"🔴 Oracle Cloud\", \"value\": \"$ORACLE_RESULT\", \"inline\": true},
                  {\"name\": \"👤 Pushed by\", \"value\": \"$ACTOR\", \"inline\": true},
                  {\"name\": \"📝 Commit\", \"value\": \"$COMMIT_MSG\"},
                  {\"name\": \"🔗 Run\", \"value\": \"$RUN_URL\"}
                ]
              }]
            }"
