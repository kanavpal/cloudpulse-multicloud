name: 🚀 CloudPulse CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:      # allow manual trigger from GitHub UI

env:
  BACKEND_PATH: /home/ubuntu/Major_2/backend   # adjust if different on your servers
  PYTHON: python3

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1 — Test & Build React frontend
  # ─────────────────────────────────────────────────────────
  test-and-build:
    name: 🧪 Test & Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build production bundle
        run: npm run build
        env:
          CI: false          # prevents treating warnings as errors

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: frontend/build/
          retention-days: 3

  # ─────────────────────────────────────────────────────────
  # JOB 2 — Deploy backend to AWS EC2
  # ─────────────────────────────────────────────────────────
  deploy-backend-aws:
    name: 🟠 Deploy Backend → AWS EC2
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - name: SSH deploy to AWS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "── Pulling latest code ──"
            cd ${{ env.BACKEND_PATH }}
            git pull origin main

            echo "── Installing Python dependencies ──"
            ${{ env.PYTHON }} -m pip install -r requirements.txt --quiet

            echo "── Applying Django migrations ──"
            ${{ env.PYTHON }} manage.py migrate --noinput

            echo "── Restarting backend ──"
            pkill -f "manage.py runserver" || true
            sleep 1
            nohup ${{ env.PYTHON }} manage.py runserver 0.0.0.0:8000 \
              > /tmp/django_aws.log 2>&1 &
            echo "✅ AWS backend restarted (PID: $!)"

  # ─────────────────────────────────────────────────────────
  # JOB 3 — Deploy backend to Oracle Cloud
  # ─────────────────────────────────────────────────────────
  deploy-backend-oracle:
    name: 🔴 Deploy Backend → Oracle Cloud
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - name: SSH deploy to Oracle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "── Pulling latest code ──"
            cd ${{ env.BACKEND_PATH }}
            git pull origin main

            echo "── Installing Python dependencies ──"
            ${{ env.PYTHON }} -m pip install -r requirements.txt --quiet

            echo "── Applying Django migrations ──"
            ${{ env.PYTHON }} manage.py migrate --noinput

            echo "── Restarting backend ──"
            pkill -f "manage.py runserver" || true
            sleep 1
            nohup ${{ env.PYTHON }} manage.py runserver 0.0.0.0:8000 \
              > /tmp/django_oracle.log 2>&1 &
            echo "✅ Oracle backend restarted (PID: $!)"
