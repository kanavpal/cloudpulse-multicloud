version: "3.9"

services:
  cloudpulse-api:
    image: multicloud-django
    container_name: cloudpulse-api
    restart: always          # J: auto-restart on crash or reboot
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
