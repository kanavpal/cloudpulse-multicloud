version: "3.9"

# AWS EC2 — API only; connects to PostgreSQL hosted on Oracle Cloud
# Oracle must have port 5432 open in its security rules

services:
  cloudpulse-api:
    image: multicloud-django
    container_name: cloudpulse-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - CLOUD_NAME=AWS
      - CLOUD_REGION=us-east-1
      - DB_HOST=152.67.188.94    # Oracle Cloud public IP — postgres runs there
      - DB_NAME=cloudstay
      - DB_USER=cloudstay_user
      - DB_PASSWORD=cloudstay_pass
      - DB_PORT=5432
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
